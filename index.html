<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Design Concepts</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; margin: 0; padding: 40px 24px; }
  h1 { font-size: 24px; color: #a78bfa; margin-bottom: 8px; }
  p { color: #64748b; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 32px; }
  .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 10px; padding: 20px; }
  .card h3 { font-size: 15px; color: #e2e8f0; margin-bottom: 8px; }
  .card p { color: #64748b; font-size: 13px; margin-bottom: 12px; }
  .links { display: flex; gap: 8px; flex-wrap: wrap; }
  .links a { font-size: 12px; color: #7c3aed; text-decoration: none; padding: 4px 10px; border: 1px solid #3b1f6e; border-radius: 4px; }
  .links a:hover { background: #1e1535; }
</style>
</head>
<body>
<h1>Web Design Concepts</h1>
<p>Custom landing page demos — built for local businesses to show what their website could look like.</p>
<div id="pocs" class="grid"></div>
<script>
// PoC pages are linked from individual lead emails.
// This index is just a landing page.
document.getElementById('pocs').innerHTML = '<p style="color:#475569">PoC pages are shared directly via email with individual business links.</p>';
</script>
</body>
</html>
